name = "servicesaitechworlds"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "aitechworlds-db"
database_id = "ab4139aa-ab4f-4e7f-b37a-f0138c298403"

[vars]
# GOOGLE_CLIENT_ID is not sensitive (it's shipped to the browser anyway) so it's fine
# to keep as a plain var. ADMIN_EMAILS and SESSION_SECRET were previously committed
# here in plaintext — that leaked the session-signing key, letting anyone with repo
# access forge admin session cookies. They are now set as Cloudflare Pages secrets
# instead (`wrangler pages secret put NAME`, or Cloudflare dashboard > Pages > your
# project > Settings > Environment variables > "Secret" type). Never put them back here.
# TURNSTILE_SECRET_KEY follows the same rule — set via `wrangler pages secret put
# TURNSTILE_SECRET_KEY` with your real secret key from the Cloudflare Turnstile
# dashboard before deploying; without it, spam-form verification is skipped entirely.
GOOGLE_CLIENT_ID = '222990716349-q8pkufkl5lj6tqmu9e3fb40jg0fcsp49.apps.googleusercontent.com'
# Same value as GOOGLE_CLIENT_ID above — Vite needs the VITE_ prefix to bake this into
# the frontend bundle at build time. This project's env vars are managed via this file
# (Cloudflare dashboard shows Plaintext vars as locked to wrangler.toml for this Pages
# project), so it must live here, not as a dashboard "Environment Variable".
VITE_GOOGLE_CLIENT_ID = '222990716349-q8pkufkl5lj6tqmu9e3fb40jg0fcsp49.apps.googleusercontent.com'